services:
  tony:
    build: .
    ports:
      - "8787:8787"
    environment:
      PORT: 8787
      TONY_LLM_PROVIDER: ${TONY_LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      OBSIDIAN_VAULT_PATH: /app/vault
      TONY_API_TOKEN: docker_tony_token
      TONY_WORKSPACE_ROOT: /workspace
    volumes:
      - ${TONY_WORKSPACE_HOST:-D:/}:/workspace:ro
      - ./vault:/app/vault
      - tony_data:/app/data

volumes:
  tony_data:
